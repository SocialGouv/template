keycloak:
  enabled: true
  postgresql:
    enabled: False

  extraEnvFrom: |
    - secretRef:
        name: keycloak-db-user
    - secretRef:
        name: keycloak-secrets
  # extraVolumes: |
  #   - name: keycloak-realm
  #     configMap:
  #       name: keycloak-realm
  # extraVolumeMounts: |
  #   - name: keycloak-realm
  #     mountPath: "/realm/"
  #     readOnly: true
  extraEnv: |
    - name: PROXY_ADDRESS_FORWARDING
      value: "true"
  # extraInitContainers: |
  #   - name: initcontainer
  #     image: bash:4
  #     imagePullPolicy: IfNotPresent
  #     command:
  #       - sh
  #     args:
  #       - -c
  #       - |
  #         echo "Hello, world"
  ingress:
    enabled: True
    annotations:
      nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
      kubernetes.io/ingress.class: nginx
    tls:
      - hosts:
          - "keycloak-${{ .Values.global.host }}"
        secretName: wildcard-crt
    rules:
      - host: "keycloak-${{ .Values.global.host }}"
        paths:
          - path: /
            pathType: Prefix

app:
  enabled: true
  probesPath: /healthz
